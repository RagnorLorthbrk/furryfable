name: Product SEO Optimizer

on:
  workflow_dispatch:
    inputs:
      since_hours:
        description: "Process products created in the last N hours (default: 48)"
        required: false
        default: "48"
  workflow_call:
    inputs:
      since_hours:
        description: "Hours window for recently created products"
        required: false
        default: "2"
        type: string

jobs:
  optimize-products:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Product SEO Optimizer
        run: node src/productSeoOptimizer.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
          SINCE_HOURS: ${{ inputs.since_hours || '48' }}
